name: Diff CCD definition

on:
  pull_request:
    branches:
      - master

jobs:

  buildBranch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 21
      - uses: actions/checkout@v7
        with:
          path: build/branch
      - name: Build
        run: ./gradlew generateCCDConfig
        working-directory: build/branch
      - uses: actions/upload-artifact@v7
        with:
          name: branch
          path: build/branch/build/definitions/NFD

  buildMaster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 21
      - uses: actions/checkout@v7
        with:
          ref: master
          path: build/master
      - name: Build
        run: ./gradlew generateCCDConfig
        working-directory: build/master
      - uses: actions/upload-artifact@v7
        with:
          name: master
          path: build/master/build/definitions/NFD

  report:
    permissions:
      issues: write
      pull-requests: write
      contents: write
    runs-on: ubuntu-latest
    needs: [buildBranch, buildMaster]
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: actions/download-artifact@v8
        with:
          name: branch
          path: build/branch
      - uses: actions/download-artifact@v8
        with:
          name: master
          path: build/master
      - name: Generate report
        id: ccd-diff
        run: |
          REPORT="$(npx -q @hmcts/ccd-diff build/master build/branch)"

          MAX_COMMENT_LENGTH=60000
          if [ "${#REPORT}" -gt "$MAX_COMMENT_LENGTH" ]; then
            REPORT="${REPORT:0:$MAX_COMMENT_LENGTH}"
            REPORT+=$'\n\n---\nReport truncated because it exceeded GitHub output size limits.\nSee job logs for full output.'
          fi

          {
            echo "content<<EOF"
            printf '%s\n' "$REPORT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Add report
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            # CCD diff report
            ${{ steps.ccd-diff.outputs.content }}
          comment_includes: CCD diff report
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
